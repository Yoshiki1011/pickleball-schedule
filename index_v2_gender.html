// 組み合わせ数 C(n,k)
function comb(n, k) {
  if (k < 0 || k > n) return 0;
  if (k === 0 || k === n) return 1;
  let result = 1;
  for (let i = 0; i < k; i++) { result = result * (n - i) / (i + 1); }
  return Math.round(result);
}

// ============================================================
// autoモード専用: コートパターンに基づく休みスケジュール生成
// ============================================================
function generateRestScheduleAuto(players, totalGames, restPerGame, playerMap, gamePatterns, males, females) {
  const schedule = Array.from({length: totalGames}, () => []);
  const restCounts = {};
  const lastRest = {};
  for (const p of players) { restCounts[p] = 0; lastRest[p] = -999; }

  for (let g = 0; g < totalGames; g++) {
    const { mixedCourts, maleCourts, femaleCourts } = gamePatterns[g];
    // 必要な出場人数（restが負にならないようにクランプ）
    const playM = mixedCourts + maleCourts * 2;
    const playF = mixedCourts + femaleCourts * 2;
    const restM = Math.max(0, males.length - playM);
    const restF = Math.max(0, females.length - playF);

    const sortByRest = (a, b) =>
      restCounts[a] !== restCounts[b] ? restCounts[a] - restCounts[b] : lastRest[a] - lastRest[b];

    // 休み回数が少ない順に選ぶ
    const restingMales   = [...males].sort(sortByRest).slice(0, restM);
    const restingFemales = [...females].sort(sortByRest).slice(0, restF);
    const resting = [...restingMales, ...restingFemales];

    schedule[g] = resting;
    for (const p of resting) { restCounts[p]++; lastRest[p] = g; }
  }

  return schedule;
}

// ============================================================
// autoモード専用: コートパターンに基づくペア生成とコート割り当て
// ============================================================
function assignCourtsAuto(redPlaying, whitePlaying, partnerCount, opponentCount, playerMap,
                          mixedCourts, maleCourts, femaleCourts, pairMatchHistory, mixedPlayCount) {
  const baseMax = parseInt(document.getElementById('maxPartner').value) || 2;
  const maxPartnerMixed = baseMax + 1; // ミックスは+1
  const maxPartnerSame  = baseMax;

  // 出場選手を性別で分ける
  const redMAll = redPlaying.filter(id => playerMap[id].gender === 'M');
  const redFAll = redPlaying.filter(id => playerMap[id].gender === 'F');
  const whtMAll = whitePlaying.filter(id => playerMap[id].gender === 'M');
  const whtFAll = whitePlaying.filter(id => playerMap[id].gender === 'F');

  // ミックス出場回数が少ない順にソートして、ミックスコート用の選手を選ぶ
  // 同じ回数の場合はランダムにシャッフル → 対戦相手の固定を防ぐ
  const sortByMixed = (a, b) => {
    const diff = (mixedPlayCount[a] || 0) - (mixedPlayCount[b] || 0);
    if (diff !== 0) return diff;
    return Math.random() - 0.5; // 同回数はランダム
  };
  // 男性と女性を独立してソート（同じ男性と同じ女性が常にペアになるのを防ぐ）
  const redM = [...redMAll].sort(sortByMixed);
  const redF = [...redFAll].sort(sortByMixed);
  const whtM = [...whtMAll].sort(sortByMixed);
  const whtF = [...whtFAll].sort(sortByMixed);

  // ミックスペアを生成（男1+女1）
  // mixedCourts個の紅ミックスペアと白ミックスペアを生成
  const redMixedPairs  = assignMixedPairs(redM.slice(0, mixedCourts), redF.slice(0, mixedCourts), partnerCount, maxPartnerMixed);
  const whtMixedPairs  = assignMixedPairs(whtM.slice(0, mixedCourts), whtF.slice(0, mixedCourts), partnerCount, maxPartnerMixed);

  // ミックス出場回数を更新
  if (redMixedPairs) {
    for (const [m, f] of redMixedPairs) {
      mixedPlayCount[m] = (mixedPlayCount[m] || 0) + 1;
      mixedPlayCount[f] = (mixedPlayCount[f] || 0) + 1;
    }
  }
  if (whtMixedPairs) {
    for (const [m, f] of whtMixedPairs) {
      mixedPlayCount[m] = (mixedPlayCount[m] || 0) + 1;
      mixedPlayCount[f] = (mixedPlayCount[f] || 0) + 1;
    }
  }

  // 同性ペアを生成
  // 男男ペア: maleCourts個（ミックスに使った分を除く）
  const redMalePlayers  = redM.slice(mixedCourts);
  const whtMalePlayers  = whtM.slice(mixedCourts);
  const redFemalePlayers = redF.slice(mixedCourts);
  const whtFemalePlayers = whtF.slice(mixedCourts);

  const redMalePairs   = assignSamePairs(redMalePlayers,   partnerCount, maxPartnerSame);
  const whtMalePairs   = assignSamePairs(whtMalePlayers,   partnerCount, maxPartnerSame);
  const redFemalePairs = assignSamePairs(redFemalePlayers, partnerCount, maxPartnerSame);
  const whtFemalePairs = assignSamePairs(whtFemalePlayers, partnerCount, maxPartnerSame);

  if (!redMixedPairs || !whtMixedPairs || !redMalePairs || !whtMalePairs || !redFemalePairs || !whtFemalePairs) {
    return null;
  }

  // コートに割り当て: ミックスコート → 男男コート → 女女コート
  const courts = [];

  // ミックスコート: 紅ミックスペア vs 白ミックスペア（対戦相手の多様性を考慮）
  const mixedCourtsResult = assignBestCourts(redMixedPairs, whtMixedPairs, opponentCount, pairMatchHistory);
  for (const [rp, wp] of mixedCourtsResult) courts.push([rp, wp]);

  // 男男コート: 紅男男ペア vs 白男男ペア
  const maleCourtsResult = assignBestCourts(redMalePairs, whtMalePairs, opponentCount, pairMatchHistory);
  for (const [rp, wp] of maleCourtsResult) courts.push([rp, wp]);

  // 女女コート: 紅女女ペア vs 白女女ペア
  const femaleCourtsResult = assignBestCourts(redFemalePairs, whtFemalePairs, opponentCount, pairMatchHistory);
  for (const [rp, wp] of femaleCourtsResult) courts.push([rp, wp]);

  return courts;
}

// ミックスペアを生成（男1+女1）
function assignMixedPairs(males, females, partnerCount, maxPartner) {
  if (males.length === 0 && females.length === 0) return [];
  if (males.length !== females.length) return null;

  const TRIALS = 20;
  let bestPairs = null, bestScore = Infinity;

  for (let trial = 0; trial < TRIALS; trial++) {
    // 男性をシャッフル
    const shuffledMales = [...males].sort(() => Math.random() - 0.5);
    const pairs = [];
    let valid = true;
    for (let i = 0; i < shuffledMales.length; i++) {
      const m = shuffledMales[i], f = females[i];
      if (partnerCount[m][f] >= maxPartner) { valid = false; break; }
      pairs.push([m, f]);
    }
    if (!valid) continue;

    const counts = pairs.map(([a, b]) => partnerCount[a][b]);
    const maxP = Math.max(...counts);
    const pairDiversity = pairs.reduce((s, [a, b]) => s + partnerCount[a][b] ** 2, 0);
    const totalScore = counts.reduce((s, c) => s + c, 0);
    const cs = maxP * 100000 + pairDiversity * 1000 + totalScore;
    if (cs < bestScore) { bestScore = cs; bestPairs = pairs.map(p => [...p]); }
  }

  // フォールバック: 制約を緩めて再試行
  if (!bestPairs) {
    const pairs = males.map((m, i) => [m, females[i]]);
    bestPairs = pairs;
  }

  return bestPairs;
}

// 同性ペアを生成
function assignSamePairs(players, partnerCount, maxPartner) {
  if (players.length === 0) return [];
  if (players.length % 2 !== 0) return null;

  const TRIALS = 20;
  let bestPairs = null, bestScore = Infinity;

  for (let trial = 0; trial < TRIALS; trial++) {
    let trialBest = null, trialScore = Infinity;

    function bt(remaining, pairs) {
      if (remaining.length === 0) {
        const counts = pairs.map(([a, b]) => partnerCount[a][b]);
        const maxP = Math.max(...counts);
        const pairDiversity = pairs.reduce((s, [a, b]) => s + partnerCount[a][b] ** 2, 0);
        const totalScore = counts.reduce((s, c) => s + c, 0);
        const cs = maxP * 100000 + pairDiversity * 1000 + totalScore;
        if (cs < trialScore) { trialScore = cs; trialBest = pairs.map(p => [...p]); }
        return;
      }
      const a = remaining[0];
      const rest = [...remaining.slice(1)];
      rest.sort((x, y) => {
        const diff = partnerCount[a][x] - partnerCount[a][y];
        if (diff !== 0) return diff;
        return Math.random() - 0.5;
      });
      for (let i = 0; i < rest.length; i++) {
        const b = rest[i];
        if (partnerCount[a][b] >= maxPartner) continue;
        bt(rest.filter((_, idx) => idx !== i), [...pairs, [a, b]]);
      }
    }

    bt(players, []);
    if (trialBest && trialScore < bestScore) { bestScore = trialScore; bestPairs = trialBest; }
  }

  return bestPairs;
}

// 最良のコート割り当てを選ぶ（対戦相手の多様性を最大化）
// ランダム性を加えるため、スコアが同じ場合はランダムに選ぶ
function assignBestCourts(redPairs, whitePairs, opponentCount, pairMatchHistory) {
  if (redPairs.length === 0) return [];
  const n = redPairs.length;
  const perms = permutations(Array.from({length: n}, (_, i) => i));

  // 各permのスコアを計算
  const scored = perms.map(perm => {
    let score = 0, maxOpp = 0;
    for (let i = 0; i < n; i++) {
      const rp = redPairs[i], wp = whitePairs[perm[i]];
      const pairKey = [...rp].sort().join(',') + '|' + [...wp].sort().join(',');
      const pairKeyRev = [...wp].sort().join(',') + '|' + [...rp].sort().join(',');
      const pairMatchCount = (pairMatchHistory.get(pairKey) || 0) + (pairMatchHistory.get(pairKeyRev) || 0);
      score += pairMatchCount * 500000;
      const isExactDuplicate = rp.every(r => wp.every(w => opponentCount[r][w] > 0));
      if (isExactDuplicate) score += 1000000;
      for (const r of rp) for (const w of wp) {
        score += opponentCount[r][w];
        maxOpp = Math.max(maxOpp, opponentCount[r][w]);
      }
    }
    return { perm, cs: maxOpp * 10000 + score };
  });

  // 最小スコアを見つける
  const minScore = Math.min(...scored.map(s => s.cs));
  // 最小スコアのpermを全て取得
  const bestPerms = scored.filter(s => s.cs === minScore).map(s => s.perm);
  // ランダムに1つ選ぶ
  const bestPerm = bestPerms[Math.floor(Math.random() * bestPerms.length)];

  return bestPerm.map((wi, ri) => [redPairs[ri], whitePairs[wi]]);
}

// 対戦相手の偏り統計を計算（最大回数・分散）
function calcOppStats(data) {
  if (!data || !data.RED || !data.WHITE || !data.opponentCount) return { maxOpp: 0, variance: 0 };
  const vals = [];
  for (const r of data.RED) for (const w of data.WHITE) vals.push(data.opponentCount[r][w]);
  const maxOpp = Math.max(...vals);
  const avg = vals.reduce((s, v) => s + v, 0) / vals.length;
  const variance = vals.reduce((s, v) => s + (v - avg) ** 2, 0) / vals.length;
  return { maxOpp, variance };
}

// ③男男vs女女のコート数をカウント
function countType3(data) {
  if (!data || !data.allCourts || !data.playerMap) return 0;
  let count = 0;
  for (const gameCourts of data.allCourts) {
    for (const [rp, wp] of gameCourts) {
      const rg = rp.map(id => data.playerMap[id].gender).sort().join('');
      const wg = wp.map(id => data.playerMap[id].gender).sort().join('');
      if ((rg === 'MM' && wg === 'FF') || (rg === 'FF' && wg === 'MM')) count++;
    }
  }
  return count;
}

const LS_KEY = 'pickleball_settings';

function saveToLocalStorage() {
  const settings = {
    courts: document.getElementById('courts').value,
    totalGames: document.getElementById('totalGames').value,
    maxPartner: document.getElementById('maxPartner').value,
    mode: currentMode,
    mixedRatio: document.getElementById('mixed-ratio').value,
    redPlayers: redPlayers.map(p => ({ name: p.name, gender: p.gender })),
    whitePlayers: whitePlayers.map(p => ({ name: p.name, gender: p.gender })),
    redTeamName: document.getElementById('red-team-name').value,
    whiteTeamName: document.getElementById('white-team-name').value,
  };
  try { localStorage.setItem(LS_KEY, JSON.stringify(settings)); } catch(e) {}
}

function loadFromLocalStorage() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (!raw) return false;
    const s = JSON.parse(raw);
    if (s.courts) document.getElementById('courts').value = s.courts;
    if (s.totalGames) document.getElementById('totalGames').value = s.totalGames;
    if (s.maxPartner) document.getElementById('maxPartner').value = s.maxPartner;
    if (s.mixedRatio) {
      document.getElementById('mixed-ratio').value = s.mixedRatio;
      document.getElementById('mixed-ratio-label').textContent = s.mixedRatio + '%';
    }
    if (s.redPlayers && s.redPlayers.length >= 2) {
      redPlayers = s.redPlayers.map((p, i) => ({ id: i + 1, name: p.name, gender: p.gender, team: 'red' }));
    }
    if (s.whitePlayers && s.whitePlayers.length >= 2) {
      const redCount = redPlayers.length;
      whitePlayers = s.whitePlayers.map((p, i) => ({ id: redCount + i + 1, name: p.name, gender: p.gender, team: 'white' }));
    }
    if (s.redTeamName) {
      document.getElementById('red-team-name').value = s.redTeamName;
      document.getElementById('red-team-label').textContent = s.redTeamName;
    }
    if (s.whiteTeamName) {
      document.getElementById('white-team-name').value = s.whiteTeamName;
      document.getElementById('white-team-label').textContent = s.whiteTeamName;
    }
    if (s.mode) selectMode(s.mode);
    return true;
  } catch(e) { return false; }
}

function resetSettings() {
  if (!confirm('設定をリセットしますか？（選手名・性別・チーム名・基本設定が初期値に戻ります）')) return;

    });
  } catch(e) {
    alert('URL生成に失敗しました: ' + e.message);
  }
}

// URLパラメータから設定を読み込む
function loadFromURL() {
  try {
    const params = new URLSearchParams(location.search);
    const s = params.get('s');
    if (!s) return false;
    const settings = JSON.parse(decodeURIComponent(atob(s)));
    if (settings.courts) document.getElementById('courts').value = settings.courts;
    if (settings.totalGames) document.getElementById('totalGames').value = settings.totalGames;
    if (settings.maxPartner) document.getElementById('maxPartner').value = settings.maxPartner;
    if (settings.mixedRatio) {
      document.getElementById('mixed-ratio').value = settings.mixedRatio;
      document.getElementById('mixed-ratio-label').textContent = settings.mixedRatio + '%';
    }
    if (settings.redTeamName) {
      document.getElementById('red-team-name').value = settings.redTeamName;
      document.getElementById('red-team-label').textContent = settings.redTeamName;
    }
    if (settings.whiteTeamName) {
      document.getElementById('white-team-name').value = settings.whiteTeamName;
      document.getElementById('white-team-label').textContent = settings.whiteTeamName;
    }
    if (settings.redPlayers && settings.redPlayers.length >= 2) {
      redPlayers = settings.redPlayers.map((p, i) => ({ id: i + 1, name: p.name, gender: p.gender, team: 'red' }));
    }
    if (settings.whitePlayers && settings.whitePlayers.length >= 2) {
      const redCount = redPlayers.length;
      whitePlayers = settings.whitePlayers.map((p, i) => ({ id: redCount + i + 1, name: p.name, gender: p.gender, team: 'white' }));
    }
    if (settings.mode) selectMode(settings.mode);
    return true;
  } catch(e) { return false; }
}

// QRコード生成
// ============================================================
function buildShareURL() {
  const settings = {
    courts: document.getElementById('courts').value,
    totalGames: document.getElementById('totalGames').value,
    maxPartner: document.getElementById('maxPartner').value,
    mode: currentMode,
    mixedRatio: document.getElementById('mixed-ratio').value,
    redTeamName: document.getElementById('red-team-name').value,
    whiteTeamName: document.getElementById('white-team-name').value,
    redPlayers: redPlayers.map(p => ({ name: p.name, gender: p.gender })),
    whitePlayers: whitePlayers.map(p => ({ name: p.name, gender: p.gender })),
  };
  const encoded = btoa(encodeURIComponent(JSON.stringify(settings)));
  return location.href.split('?')[0] + '?s=' + encoded;
}

function showQRCode() {
  const url = buildShareURL();
  const modal = document.getElementById('qr-modal');
  const wrap = document.getElementById('qr-canvas-wrap');
  const urlText = document.getElementById('qr-url-text');

  wrap.innerHTML = '<div style="color:#888;font-size:0.85rem;padding:20px">QRコード生成中...</div>';
  urlText.textContent = url;
  modal.style.display = 'flex';

  // qrcode.jsをCDNから動的ロード
  loadQRCodeJS().then(() => {
    wrap.innerHTML = '';
    const canvas = document.createElement('canvas');
    wrap.appendChild(canvas);
    QRCode.toCanvas(canvas, url, {
      width: 220,
      margin: 2,
      color: { dark: '#1F4E79', light: '#ffffff' }
    }, err => {
      if (err) {
        wrap.innerHTML = `<div style="color:#cc0000;font-size:0.8rem">QRコード生成エラー: ${err.message}</div>`;
      }
    });
  }).catch(e => {
    wrap.innerHTML = `<div style="color:#cc0000;font-size:0.8rem">ライブラリ読み込みエラー</div>`;
  });
}

function closeQRModal() {
  document.getElementById('qr-modal').style.display = 'none';
}

// モーダル外クリックで閉じる
document.getElementById('qr-modal').addEventListener('click', function(e) {
  if (e.target === this) closeQRModal();
});

function loadQRCodeJS() {
  return new Promise((resolve, reject) => {
    if (window.QRCode) { resolve(); return; }
    const script = document.createElement('script');
    script.src = 'https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js';
    script.onload = resolve;
    script.onerror = () => reject(new Error('QRコードライブラリの読み込みに失敗しました'));
    document.head.appendChild(script);
  });
}
